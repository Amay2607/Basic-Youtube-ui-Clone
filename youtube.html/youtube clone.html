<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/general1.css">
    <link rel="stylesheet" href="styles/header1.css">
    <link rel="stylesheet" href="styles/video-preview1.css">
    <link rel="stylesheet" href="styles/sidebar1.css">
</head>

<body>

  <div class="header">
    <div class="left-sec">
      <img class="menu-logo" src="header/hamburger-menu.svg" alt="menu">
      <img class="logo-logo" src="header/youtube-logo.svg" alt="YouTube logo">
    </div>
    <div class="middle-sec">
      <input class="search" type="text" placeholder="Search">
      <button class="search-button">
        <img class="search-img" src="header/search.svg" alt="search">
      </button>
      <button class="vsearch-button">
        <img class="voice-search" src="header/voice-search-icon.svg" alt="voice search">
      </button>
    </div>
    <div class="right-sec">
      <img class="upload-img" src="header/upload.svg" alt="upload">
      <img class="apps-img" src="header/youtube-apps.svg" alt="apps">
      <img class="notification-img" src="header/notifications.svg" alt="notifications">
      <img class="channel-img" src="header/my-channel.jpeg" alt="my channel">
    </div>
  </div>

  <div class="sidebar">
    <img class="home-img" src="header/home.svg" alt="home">
    <img class="exp-img" src="header/explore.svg" alt="explore">
    <img class="sub-img" src="header/subscriptions.svg" alt="subscriptions">
    <img class="og-img" src="header/originals.svg" alt="originals">
    <img class="mus-img" src="header/youtube-music.svg" alt="music">
    <img class="lib-img" src="header/library.svg" alt="library">
  </div>

  <div class="grid-preview">


    <div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="thumbnails/thumbnail-1.webp" alt="video thumbnail">
        <div class="time-1">14:20</div>
      </div>
      <div class="video-info-grid">
        <div class="channel-pic">
          <img class="dp-dp" src="channel/channel-1.jpeg" alt="channel">
        </div>
        <div class="video-info">
          <p class="title-1">Talking Tech and AI with Google CEO Sundar Pichai!</p>
          <p class="author-1">Marques Brownlee</p>
          <p class="date-1">3.4M views · 6 months ago</p>
        </div>
      </div>
    </div>

    <div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="thumbnails/thumbnail-2.webp" alt="video thumbnail">
        <div class="time-1">10:45</div>
      </div>
      <div class="video-info-grid">
        <div class="channel-pic">
          <img class="dp-dp" src="channel/channel-2.jpeg" alt="channel">
        </div>
        <div class="video-info">
          <p class="title-1">Try Not To Laugh Challenge #9</p>
          <p class="author-1">Marques Brownlee</p>
          <p class="date-1">19M views · 4 years ago</p>
        </div>
      </div>
    </div>

    <div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="thumbnails/thumbnail-3.webp" alt="video thumbnail">
        <div class="time-1">12:30</div>
      </div>
      <div class="video-info-grid">
        <div class="channel-pic">
          <img class="dp-dp" src="channel/channel-3.jpeg" alt="channel">
        </div>
        <div class="video-info">
          <p class="title-1">Crazy Tik Toks Taken Moments Before DISASTER</p>
          <p class="author-1">SSSniperWolf</p>
          <p class="date-1">12M views · 1 year ago</p>
        </div>
      </div>
    </div>


  </div>

</body>
</html>
