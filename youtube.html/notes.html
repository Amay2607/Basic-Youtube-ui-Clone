 <!-- lesson 15:--
 z-index is used to control the vertical stacking order of positioned elements
(i.e., which element appears in front or behind another)


🔵 position: fixed

Definition:
position: fixed places an element relative to the browser screen (viewport).

In simple words:
👉 It stays fixed on the screen and does not move when you scroll.

🔴 position: absolute

Definition:
position: absolute places an element relative to its nearest positioned parent.
If no parent is positioned, it is placed relative to the page (body).

In simple words:
👉 It moves inside another element and scrolls with the page.


if we put a position: absolute div inside a position: fixed div,
the absolute div is positioned relative to the fixed div, not the page. -->
